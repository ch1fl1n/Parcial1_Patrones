apiVersion: v2
name: parcial
description: A Helm chart for deploying the Next.js app with PostgreSQL database
type: application
version: 0.1.0
appVersion: "1.0"

dependencies:
  - name: postgresql
    version: "18.5.1"   # bump to latest available chart
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: app
    version: "0.1.0"
    repository: "file://./charts/app"