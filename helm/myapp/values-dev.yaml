# values-dev.yaml - valores para entorno dev
app:
  replicaCount: 3

image:
  repository: parcial
  tag: dev

service:
  type: ClusterIP
  port: 80

# ejemplo de configuración extra que podrías tener
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    memory: "256Mi"

env: 
  - name: ENVIRONMENT
    value: "dev"